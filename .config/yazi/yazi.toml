[manager]
layout = [1, 3, 4]
show_hidden = false
sort_by = "alphabetical"
sort_sdir_first = true
sort_sensitive = false
scrolloff = 5

[preview]
tab_size = 4
max_width = 600
max_height = 900
cache_dir = "/tmp/yazi"

[opener]
rules = [
  { mime = "text/*", use = "nvim" },
  { mime = "image/*", use = "feh" },
  { mime = "video/*", use = "mpv" },
  { mime = "audio/*", use = "mpv" },
  { fallback = true, use = "xdg-open" },
]

[openers]
nvim = { run = 'kitty -e nvim "$@"', block = true }
feh = { run = 'feh "$@"', desktop = true }
mpv = { run = 'mpv "$@"', desktop = true }

[trash]
bin = "/tmp/yazi-trash"
