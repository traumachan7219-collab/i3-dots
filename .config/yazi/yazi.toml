[manager]
layout = [1, 3, 4]
show_hidden = false
sort_by = "alphabetical"
sort_dir_first = true
sort_sensitive = false
scrolloff = 5

[preview]
tab_size = 4
max_width = 600
max_height = 900
cache_dir = "/tmp/yazi"

[opener]
rules = [
  { mime = "text/*", run = 'kitty -e nvim "$@"', block = true },
  { mime = "image/*", run = 'feh "$@"', desktop = true },
  { mime = "video/*", run = 'mpv "$@"', desktop = true },
  { mime = "audio/*", run = 'mpv "$@"', desktop = true },
  { fallback = true, run = 'xdg-open "$@"' },
]

[trash]
bin = "/tmp/yazi-trash"
