# --- Fonts & Layout ---
font_family      DejaVuSansM Nerd Font Mono
font_size        14.0
# ==========================================================================
#                         KITTY TERMINAL SUPER-CONFIG
# ==========================================================================

# --- Fonts & Typography ---
font_family      DejaVuSansM Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

# Performance tweaks for crisp font rendering
disable_ligatures transparent
box_drawing_scale 0.001, 1, 1.5, 2

# --- Window Layout & Padding ---
window_padding_width  14
remember_window_size  no
initial_width         950
initial_height        600
hide_window_decorations yes

# --- Window Transparency & Blur ---
background_opacity         0.54 
dynamic_background_opacity yes

# --- Smooth Cursor Configuration ---
cursor                #d81b60
cursor_text_color     #13131a
cursor_shape          beam
cursor_beam_thickness 1.8
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# --- Terminal Performance & Bell Settings ---
repaint_delay    8
input_delay      2
sync_to_monitor  yes# --- Color Palette (Matched to Polybar & i3 Scheme with Pink Text) ---

# The basic colors
background #1F1F1F
foreground #ffb3d1      # <-- Soft, highly readable pastel pink for all normal text
bold_color #ec407a      # <-- A punchier pink for bold text

# Interactive elements
cursor               #d81b60  # Your main theme pink for the cursor
cursor_text_color    #1F1F1F  # Makes text under the cursor readable
selection_background #d81b60  # Highlighting text turns it theme-pink
selection_foreground #FFFFFF  # Text inside the selection stays crisp whiteenable_audio_bell no
window_alert_on_bell no

# --- Mouse & Selection Behavior ---
url_color        #00ffff
url_style        curly
open_url_with    default
detect_urls      yes
copy_on_select   yes

# ==========================================================================
#                   COLOR PALETTE (The Perfect Pink & Miku Theme)
# ==========================================================================
background #1F1F1F
foreground #ffb3d1
bold_color #ec407a
selection_background  #d81b60
selection_foreground  #ffffff

# Black / Dark Grey (Deep background accents)
color0  #1a1a24
color8  #575766

# Red / Deep Pink (Fierce Accents)
color1  #d81b60
color9  #ff4081

# Green (Muted so it doesn't clash with your setup anymore)
color2  #5f875f
color10 #87af87

# Yellow / Orange
color3  #ffb300
color11 #ffd740

# Blue
color4  #1e88e5
color12 #2979ff

# Magenta / Pastel Pink (Main Pop Colors)
color5  #ffb3d1
color13 #f50057

# Cyan (Electric Miku Cyan!)
color6  #00ffff
color14 #00e5ff

# White
color7  #e4e4e4
color15 #ffffff

# ==========================================================================
#                         QUALITY OF LIFE SHORTCUTS
# ==========================================================================
# Quick Clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Font scaling on the fly
map ctrl+equal     change_font_size all +1.0
map ctrl+minus     change_font_size all -1.0
map ctrl+kp_0      change_font_size all 0

# URL clicking shortcut
map ctrl+left click ungrabbed no_op
